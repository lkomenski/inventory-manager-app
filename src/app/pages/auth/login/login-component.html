<main class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">

  <section class="max-w-md w-full space-y-8" aria-labelledby="login-heading">

    <!-- Header -->
    <header>
      <h2 id="login-heading" class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Sign in to your account
      </h2>
    </header>

    <!-- Login Form -->
    <app-dynamic-object-form
      [fields]="loginFields"
      [config]="formConfig"
      [submitting]="submitting"
      [error]="serverError"
      (formSubmit)="onFormSubmit($event)"
      (formCancel)="onFormCancel()">
    </app-dynamic-object-form>

    <!-- Register Link -->
    <p class="mt-2 text-center text-sm text-gray-600">
      Don't have an account?
      <a href="/auth/register" class="font-medium text-blue-600 hover:text-blue-500">
        Register here
      </a>
    </p>

  </section>
</main>

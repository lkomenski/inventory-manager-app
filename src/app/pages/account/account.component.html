<main class="min-h-screen py-12 bg-gray-50">
  <div class="container mx-auto px-4">
    <div class="max-w-md mx-auto">

      <!-- Header -->
      <header class="text-center mb-8">
        <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <h1 class="text-3xl font-semibold text-gray-900 mb-1">My Account</h1>
        <p class="text-gray-500">{{ currentUser()?.email }}</p>
      </header>

      <!-- Card -->
      <section aria-labelledby="dashboard-heading" class="bg-white border border-gray-200 rounded-lg shadow-sm p-8 space-y-6">
        <h2 id="dashboard-heading" class="text-xl font-semibold text-gray-900">Welcome back!</h2>

        <!-- Token Expiry Countdown -->
        @if (tokenExpiresIn()) {
          <div class="bg-purple-50 border border-purple-100 rounded-lg p-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-purple-600" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span class="text-sm font-medium text-gray-700" id="expiry-label">Session expires in</span>
            </div>
            <output aria-labelledby="expiry-label"
                    [class]="tokenExpiresIn() === 'Expired' ? 'text-sm font-semibold text-red-600' :
                             +tokenExpiresIn().split('m')[0] < 5 && !tokenExpiresIn().includes('h') ? 'text-sm font-semibold text-orange-500' :
                             'text-sm font-semibold text-purple-700'">
              {{ tokenExpiresIn() }}
            </output>
          </div>
        }

        <!-- Quick Actions -->
        <nav aria-label="Quick actions" class="space-y-2">
          <a routerLink="/products"
             class="block w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-md transition-colors text-center font-medium">
            View Inventory
          </a>
          @if (isAdmin()) {
            <a routerLink="/products/create"
               class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 rounded-md transition-colors text-center font-medium">
              Add New Item
            </a>
            <a routerLink="/admin"
               class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 rounded-md transition-colors text-center font-medium">
              Admin Panel
            </a>
          }
        </nav>

        <!-- Logout -->
        <button
          (click)="onLogout()"
          type="button"
          class="w-full bg-red-600 text-white px-6 py-2.5 rounded-md font-medium hover:bg-red-700 transition-colors">
          Logout
        </button>
      </section>

    </div>
  </div>
</main>
